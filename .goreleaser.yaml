version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kubectl-costby
    binary: kubectl-costby
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: kubectl-costby
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "kubectl-costby_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

krews:
  - name: costby
    repository:
      owner: vinayus
      name: krew-index
      branch: "costby-{{ .Version }}"
      pull_request:
        enabled: true
        base:
          owner: kubernetes-sigs
          name: krew-index
          branch: master
    homepage: https://github.com/vinayus/kubectl-costby
    description: Shows resource consumption (CPU, memory, restarts, OOMKills, storage) grouped by any Kubernetes label key.
    short_description: Group resource consumption by Kubernetes label.
    skip_upload: false
